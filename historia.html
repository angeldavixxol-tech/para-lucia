<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nuestra Historia ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:linear-gradient(180deg,#ff8fb1,#ffd6e0);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
overflow-x:hidden;
color:white;
padding:20px;
}

.contenedor{
width:100%;
max-width:500px;
text-align:center;
}

#corazon{
font-size:70px;
animation:latido 1s infinite;
margin-bottom:20px;
}

@keyframes latido{
0%,100%{
transform:scale(1);
}

50%{
transform:scale(1.2);
}
}

#mensaje{
font-size:22px;
line-height:1.8;
min-height:170px;
margin-bottom:25px;
}

#contador{
display:none;
}

.tarjetas{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
margin-top:20px;
}

.tarjeta{
background:rgba(255,255,255,.18);
backdrop-filter:blur(10px);
border-radius:20px;
padding:18px;
}

.numero{
font-size:30px;
font-weight:bold;
}

.texto{
font-size:15px;
}

#fraseFinal{
display:none;
margin-top:25px;
font-size:18px;
line-height:1.7;
}

#continuar{
display:none;
margin-top:25px;
padding:15px 22px;
border:none;
border-radius:40px;
background:white;
color:#ff4d88;
font-size:17px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}
#continuar:hover{
transform:scale(1.05);
}

</style>

</head>

<body>

<div class="contenedor">

<div id="corazon">❤️</div>

<div id="mensaje"></div>

<div id="contador">
<h2>Llevamos juntos ❤️</h2>
<div class="tarjetas">

<div class="tarjeta">
<div class="numero" id="meses">0</div>
<div class="texto">Meses</div>
</div>

<div class="tarjeta">
<div class="numero" id="dias">0</div>
<div class="texto">Días</div>
</div>

<div class="tarjeta">
<div class="numero" id="horas">0</div>
<div class="texto">Horas</div>
</div>

<div class="tarjeta">
<div class="numero" id="minutos">0</div>
<div class="texto">Minutos</div>
</div>

<div class="tarjeta">
<div class="numero" id="segundos">0</div>
<div class="texto">Segundos</div>
</div>

</div>

<p id="fraseFinal">
Espero t guste lo q te he hecho con alguito de sueño :(
</p>

<button id="continuar" onclick="location.href='galeria.html'">
🫶 Deseo vivir más recuerdos bonitos de los q ya tenemos 🫶
</button>

</div>

</div>

</body>
</html>
