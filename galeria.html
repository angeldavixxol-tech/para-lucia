<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nuestros recuerdos ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:linear-gradient(180deg,#ff8fb1,#ffd6e0);
color:white;
min-height:100vh;
text-align:center;
padding:25px;
}

h1{
margin-bottom:15px;
}

p{
font-size:18px;
margin-bottom:25px;
}

.galeria{
display:flex;
flex-direction:column;
gap:25px;
align-items:center;
}

.recuerdo{
width:90%;
max-width:400px;
background:white;
padding:10px;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,.2);
animation:aparecer 1s ease;
}

.recuerdo img,
.recuerdo video{
width:100%;
border-radius:15px;
}

@keyframes aparecer{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

button{
margin-top:30px;
padding:15px 25px;
border:none;
border-radius:30px;
background:white;
color:#ff4d88;
font-size:17px;
font-weight:bold;
}
</style>

</head>

<body>

<h1>Nuestros recuerdos más bonitos ❤️</h1>

<p>
Cada fotito guarda un momento de nosotros 🫶
</p>


<div class="galeria">

<div class="recuerdo">
<img src="fotos/foto1.jpg">
</div>

<div class="recuerdo">
<img src="fotos/foto2.jpg">
</div>

<div class="recuerdo">
<img src="fotos/foto3.jpg">
</div>

<div class="recuerdo">
<img src="fotos/foto4.jpg">
</div>

<div class="recuerdo">
<img src="fotos/foto5.jpg">
</div>

</div>


<button>
❤️ Seguir con nuestra historia ❤️
</button>


</body>
</html>
