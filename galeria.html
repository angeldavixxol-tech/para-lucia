<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nuestros recuerdos ❤️</title>

<style>
body{
margin:0;
padding:20px;
background:linear-gradient(#ff8fb1,#ffd6e0);
font-family:Arial;
color:white;
text-align:center;
}

h1{
font-size:28px;
}

.galeria{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:20px;
} 

img,
video{
width:100%;
border-radius:18px;
display:block;
box-shadow:0 8px 20px rgba(0,0,0,.25);
transition:.3s;
}

img:hover,
video:hover{
transform:scale(1.03);
} 

button{
margin-top:30px;
padding:15px 25px;
border:none;
border-radius:30px;
color:#ff4d88;
font-size:18px;
}
</style>

</head>

<body>

<h1>Nuestros recuerdos ❤️</h1>

<p>Cada momento contigo es especial 🫶</p>

<div class="galeria">

</div>

<button onclick="location.href='final.html'">
❤️ Continuar ❤️
</button>
<script src="fotos.js"></script>

<script>
const galeria = document.querySelector(".galeria");
galeria.innerHTML = "";

archivos.forEach(archivo => {

  if (archivo.endsWith(".mp4")) {

    galeria.innerHTML += `
      <video controls>
        <source src="fotos/${archivo}" type="video/mp4">
      </video>
    `;

  } else {

    galeria.innerHTML += `
      <img src="fotos/${archivo}">
    `;

  }

});
</script>
</body>
</html>
